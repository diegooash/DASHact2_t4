<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Listado</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        table { border-collapse: collapse; width: 80%; margin-top: 20px; }
        th, td { border: 1px solid #dddddd; text-align: left; padding: 8px; }
        th { background-color: #f2f2f2; }
        .header-info { background-color: #e9ecef; padding: 15px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="header-info">
        <h1 th:text="${titulo}"></h1>
        <p><strong>Proyecto:</strong> <span th:text="${proyecto}"></span></p>
        <p><strong>Autor:</strong> <span th:text="${autor}"></span></p>
        <p><strong>Codigo:</strong> <span th:text="${codigo}"></span></p>
        <p><strong>Usuario:</strong> <span th:text="${usuario}"></span></p>
    </div>

    <p>
        <a th:href="@{/mvc/empleados/formulario}">+ Registrar Nuevo Empleado</a>
        |
        <a th:href="@{/mvc/empleados/filtrar(puesto='Ingeniero')}">Filtrar Ingenieros</a>
        |
        <a th:href="@{/mvc/empleados/listar}">Ver Todos</a>
    </p>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Puesto</th>
                <th>Edad</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="emp : ${empleados}">
                <td th:text="${emp.id}"></td>
                <td th:text="${emp.nombre}"></td>
                <td th:text="${emp.apellido}"></td>
                <td th:text="${emp.puesto}"></td>
                <td th:text="${emp.edad}"></td>
                <td><a th:href="@{/mvc/empleados/detalle/{id}(id=${emp.id})}">Ver Detalle</a></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
