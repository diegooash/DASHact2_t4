<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Resultado</title>
</head>
<body style="font-family: Arial, sans-serif; margin: 30px;">
    <h1 th:text="${titulo}"></h1>
    <div style="background-color: #d4edda; padding: 15px; border: 1px solid #c3e6cb; border-radius: 5px; width: 400px;">
        <p><strong>Nombre:</strong> <span th:text="${empleado.nombre}"></span></p>
        <p><strong>Apellido:</strong> <span th:text="${empleado.apellido}"></span></p>
        <p><strong>Puesto:</strong> <span th:text="${empleado.puesto}"></span></p>
        <p><strong>Edad:</strong> <span th:text="${empleado.edad}"></span></p>
    </div>
    <br>
    <a th:href="@{/mvc/empleados/listar}">Volver al Listado</a>
</body>
</html>
