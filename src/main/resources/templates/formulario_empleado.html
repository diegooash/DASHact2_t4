<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Formulario</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        form { width: 300px; padding: 20px; border: 1px solid #ccc; border-radius: 5px; }
        input { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; padding: 10px; border: none; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <h1 th:text="${titulo}"></h1>
    <form th:action="@{/mvc/empleados/guardar}" th:object="${empleadoDTO}" method="post">
        <label>Nombre:</label>
        <input type="text" th:field="*{nombre}" required>

        <label>Apellido:</label>
        <input type="text" th:field="*{apellido}" required>

        <label>Puesto:</label>
        <input type="text" th:field="*{puesto}" required>

        <label>Edad:</label>
        <input type="number" th:field="*{edad}" required>

        <button type="submit">Guardar Empleado</button>
    </form>
    <br>
    <a th:href="@{/mvc/empleados/listar}">Volver al Listado</a>
</body>
</html>
